services:
  file-transfer:
    image: ghcr.io/yantianqi1/file-transfer:latest
    ports:
      - "8009:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      UPLOADS_DIR: /data/uploads
      CONFIG_DIR: /data/config
      CHUNKS_DIR: /data/chunks
    volumes:
      - file_transfer_uploads:/data/uploads
      - file_transfer_config:/data/config
      - file_transfer_chunks:/data/chunks
    restart: unless-stopped

volumes:
  file_transfer_uploads:
  file_transfer_config:
  file_transfer_chunks:
